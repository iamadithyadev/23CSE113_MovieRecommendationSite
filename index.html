<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieVault - Home</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" href="shared.css">
</head>
<body>

<!-- LOGIN PAGE (visible if not logged in) -->
<div id="loginPage">
  <div class="login-card">
    <div class="login-logo"><span>Movie</span>Vault</div>
    <div class="login-tagline">INDIAN CINEMA HUB</div>
    <div class="tab-row">
      <button id="tabL" class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button id="tabS" class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
    </div>
    <div id="divLogin">
      <form onsubmit="event.preventDefault(); doLogin();">
        <input id="lUser" class="form-control-custom" type="text" placeholder="Username">
        <input id="lPass" class="form-control-custom" type="password" placeholder="Password">
        <button type="submit" class="btn-red">Sign In</button>
      </form>
      <div class="demo-hint">Admin: admin / admin123 &nbsp;|&nbsp; User: user / user123</div>
    </div>
    <div id="divSignup" style="display:none;">
      <form onsubmit="event.preventDefault(); doSignup();">
        <input id="sUser" class="form-control-custom" type="text" placeholder="Username">
        <input id="sPass" class="form-control-custom" type="password" placeholder="Password (4+ chars)">
        <button type="submit" class="btn-red">Create Account</button>
      </form>
    </div>
  </div>
</div>

<!-- MAIN APP SHELL (hidden until login) -->
<div id="appShell">
  <nav class="topnav">
    <div class="topnav-inner">
      <a href="index.html" class="nav-logo"><span>Movie</span>Vault</a>
      <form class="nav-search-wrap" onsubmit="event.preventDefault(); searchMovie();">
        <input id="searchInput" class="nav-search-input" placeholder="Search movies...">
        <button type="submit" class="nav-search-btn">Go</button>
      </form>
      <div class="nav-links">
        <a href="index.html" class="nav-link-btn">Home</a>
        <a href="genres.html" class="nav-link-btn">Genres</a>
        <a href="favorites.html" class="nav-link-btn">Fav</a>
        <a href="contact.html" class="nav-link-btn">Contact</a>
        <a href="about.html" class="nav-link-btn">About</a>
        <button class="nav-exit-btn" onclick="logout()">Logout</button>
      </div>
    </div>
  </nav>

  <div class="hero-banner">
    <img src="suriya.jpg" alt="Cinema Banner" onerror="this.src='https://placehold.co/1600x400/1a1a1a/red?text=Banner+Image'">
  </div>

  <div id="mainContent"></div>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-main">
        <div><span class="nav-logo" style="font-size:28px;"><span style="color:var(--red);">Movie</span>Vault</span><p style="color:var(--gray); font-size:12px; margin-top:10px;">Indian Cinema Discovery</p></div>
        <div><h4 style="color:var(--gray); font-size:11px; margin-bottom:14px;">NAVIGATE</h4><a href="index.html" class="footer-link">Home</a><a href="genres.html" class="footer-link">Genres</a></div>
        <div><h4 style="color:var(--gray); font-size:11px; margin-bottom:14px;">CINEMA</h4><span class="footer-link">Bollywood</span><span class="footer-link">Tollywood</span></div>
      </div>
      <div class="footer-bottom"><p>© 2025 MovieVault · Made with ❤️</p><p>Powered by TMDb API</p></div>
    </div>
  </footer>
</div>

<!-- Movie Detail Modal -->
<div class="modal fade" id="movieModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-header border-0"><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
      <div class="modal-body" id="modalBody"><div class="loader"></div></div>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
  // Check if already logged in
  const saved = localStorage.getItem("currentUser");
  if (saved) {
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("appShell").style.display = "block";
    initHome();
  } else {
    document.getElementById("loginPage").style.display = "flex";
    document.getElementById("appShell").style.display = "none";
  }
</script>
</body>
</html>
